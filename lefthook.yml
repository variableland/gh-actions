pre-commit:
  jobs:
    - name: static check
      run: mise run check
      glob:
        - "actions/**/*.{ts,tsx}"
        - "actions/**/tsconfig.json"

pre-push:
  jobs:
    - name: verify action dist
      run: |
        mise run build
        if ! git diff --exit-code 'actions/*/dist'; then
          echo ""
          echo "❌ One or more actions have dist/ out of sync with src/."
          echo "   Run 'mise run build' and commit the result before pushing."
          exit 1
        fi
      glob:
        - "actions/*/src/**"
        - "actions/*/package.json"
        - "actions/*/tsconfig.json"
